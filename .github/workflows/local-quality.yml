name: Проверка качества HausmanHub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  local-check:
    name: Проверить файлы проекта
    runs-on: ubuntu-latest
    steps:
      - name: Получить файлы проекта
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Подготовить Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Установить проверку схем
        run: python3 -m pip install --disable-pip-version-check jsonschema==4.25.1
      - name: Запустить проверки HausmanHub
        run: python3 tools/check_local_release.py
